%YAML 1.2
---
$id: http://devicetree.org/schemas/thermal/allwinner,sun8i-a83t-ths.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Allwinner SUN8I Thermal Controller

maintainers:
  - Vasily Khoruzhick <anarsoul@gmail.com>
  - Yangtao Li <tiny.windzz@gmail.com>

$ref: thermal-sensor.yaml#

properties:
  compatible:
    enum:
      - allwinner,sun8i-a83t-ths
      - allwinner,sun8i-h3-ths
      - allwinner,sun8i-r40-ths
      - allwinner,sun20i-d1-ths
      - allwinner,sun50i-a64-ths
      - allwinner,sun50i-a100-ths
      - allwinner,sun50i-h5-ths
      - allwinner,sun50i-h6-ths
      - allwinner,sun50i-h616-ths
      - allwinner,sun55i-a523-ths0
      - allwinner,sun55i-a523-ths1

  clocks:
    minItems: 1
    items:
      - description: Bus Clock
      - description: Module Clock
      - description: GPADC Clock

  clock-names:
    minItems: 1
    maxItems: 2
    items:
      - const: bus
      - const: mod
      - const: gpadc

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  resets:
    maxItems: 1

  nvmem-cells:
    minItems: 1
    items:
      - description: Calibration data for thermal sensors
      - description: Additional cell in case of separate calibration data

  nvmem-cell-names:
    minItems: 1
    items:
      - const: calibration
      - const: calibration-second-part

  allwinner,sram:
    maxItems: 1
    description: phandle to device controlling temperate offset SYS_CFG register

  "#thermal-sensor-cells":
    enum:
      - 0
      - 1

allOf:
  - if:
      properties:
        compatible:
          contains:
            enum:
              - allwinner,sun20i-d1-ths
              - allwinner,sun50i-a100-ths
              - allwinner,sun50i-h6-ths
              - allwinner,sun50i-h616-ths

    then:
      properties:
        clocks:
          maxItems: 1

        clock-names:
          maxItems: 1

    else:
      properties:
        clocks:
          minItems: 2

        clock-names:
          minItems: 2

  - if:
      not:
        properties:
          compatible:
            contains:
              const: allwinner,sun50i-h616-ths

    then:
      properties:
        allwinner,sram: false

  - if:
      properties:
        compatible:
          contains:
            enum:
              - allwinner,sun8i-h3-ths
              - allwinner,sun20i-d1-ths
              - allwinner,sun55i-a523-ths0

    then:
      properties:
        "#thermal-sensor-cells":
          const: 0

    else:
      properties:
        "#thermal-sensor-cells":
          const: 1

  - if:
      not:
        properties:
          compatible:
            contains:
              enum:
                - allwinner,sun8i-a83t-ths

    then:
      required:
        - clocks
        - clock-names
        - resets

  - if:
      properties:
        compatible:
          contains:
            enum:
              - allwinner,sun55i-a523-ths0
              - allwinner,sun55i-a523-ths1
    then:
      properties:
        clocks:
          minItems: 2
        clock-names:
          enum: [ bus, gpadc ]
        nvmem-cells:
          minItems: 2
        nvmem-cell-names:
          minItems: 2
    else:
      properties:
        nvmem-cells:
          maxItems: 1
        nvmem-cell-names:
          maxItems: 1
          items:
            - const: calibration

required:
  - compatible
  - reg
  - interrupts

unevaluatedProperties: false

examples:
  - |
    thermal-sensor@1f04000 {
        compatible = "allwinner,sun8i-a83t-ths";
        reg = <0x01f04000 0x100>;
        interrupts = <0 31 0>;
        nvmem-cells = <&ths_calibration>;
        nvmem-cell-names = "calibration";
        #thermal-sensor-cells = <1>;
    };

  - |
    thermal-sensor@1c25000 {
        compatible = "allwinner,sun8i-h3-ths";
        reg = <0x01c25000 0x400>;
        clocks = <&ccu 0>, <&ccu 1>;
        clock-names = "bus", "mod";
        resets = <&ccu 2>;
        interrupts = <0 31 0>;
        nvmem-cells = <&ths_calibration>;
        nvmem-cell-names = "calibration";
        #thermal-sensor-cells = <0>;
    };

  - |
    thermal-sensor@5070400 {
        compatible = "allwinner,sun50i-h6-ths";
        reg = <0x05070400 0x100>;
        clocks = <&ccu 0>;
        clock-names = "bus";
        resets = <&ccu 2>;
        interrupts = <0 15 0>;
        nvmem-cells = <&ths_calibration>;
        nvmem-cell-names = "calibration";
        #thermal-sensor-cells = <1>;
    };

  - |
    thermal-sensor@2009400 {
      compatible = "allwinner,sun55i-a523-ths1";
      reg = <0x02009400 0x400>;
      interrupts = <GIC_SPI 62 IRQ_TYPE_LEVEL_HIGH>;
      clocks = <&ccu CLK_BUS_THS>, <&ccu CLK_GPADC1>;
      clock-names = "bus", "gpadc";
      resets = <&ccu RST_BUS_THS>;
      nvmem-cells = <&ths_calibration0>, <&ths_calibration1>;
      nvmem-cell-names = "calibration",
             "calibration-second-part";
      #thermal-sensor-cells = <1>;
    };
...
