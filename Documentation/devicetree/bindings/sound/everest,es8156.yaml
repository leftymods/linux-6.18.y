%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/everest,es8156.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Everest ES8156 8-channel audio DAC

maintainers:
  - AtriOS Team <leftymods@users.noreply.github.com>

description: |
  Everest ES8156 8-channel audio DAC

  Pins on the device (for linking into audio routes):

    Outputs:
      * AOUT1: Analog Output 1
      * AOUT2: Analog Output 2
      * AOUT3: Analog Output 3
      * AOUT4: Analog Output 4
      * AOUT5: Analog Output 5
      * AOUT6: Analog Output 6
      * AOUT7: Analog Output 7
      * AOUT8: Analog Output 8

allOf:
  - $ref: dai-common.yaml#

properties:
  compatible:
    enum:
      - everest,es8156

  reg:
    maxItems: 1

  clocks:
    items:
      - description: clock for master clock (MCLK)

  clock-names:
    items:
      - const: mclk

  port:
    $ref: audio-graph-port.yaml#
    unevaluatedProperties: false

  "#sound-dai-cells":
    const: 0

required:
  - compatible
  - reg
  - "#sound-dai-cells"

unevaluatedProperties: false

examples:
  - |
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;
      es8156: codec@8 {
        compatible = "everest,es8156";
        reg = <0x08>;
        clocks = <&clkc CLKID_MCLK0>;
        clock-names = "mclk";
        #sound-dai-cells = <0>;
      };
    };
