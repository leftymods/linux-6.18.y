%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/everest,es7210.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Everest ES7210 4-channel audio ADC

maintainers:
  - AtriOS Team <leftymods@users.noreply.github.com>

description: |
  Everest ES7210 4-channel audio ADC

  Pins on the device (for linking into audio routes):

    Inputs:
      * MIC1: Microphone 1 Analog Input
      * MIC2: Microphone 2 Analog Input
      * MIC3: Microphone 3 Analog Input
      * MIC4: Microphone 4 Analog Input

allOf:
  - $ref: dai-common.yaml#

properties:
  compatible:
    enum:
      - everest,es7210

  reg:
    maxItems: 1

  clocks:
    items:
      - description: clock for master clock (MCLK)

  clock-names:
    items:
      - const: mclk

  port:
    $ref: audio-graph-port.yaml#
    unevaluatedProperties: false

  "#sound-dai-cells":
    const: 0

required:
  - compatible
  - reg
  - "#sound-dai-cells"

unevaluatedProperties: false

examples:
  - |
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;
      es7210: codec@40 {
        compatible = "everest,es7210";
        reg = <0x40>;
        clocks = <&clkc CLKID_MCLK0>;
        clock-names = "mclk";
        #sound-dai-cells = <0>;
      };
    };
